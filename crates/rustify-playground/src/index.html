<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rustify Playground</title>

    <style>
      :root {
        --bg-main: #0c1017;
        --bg-header: #090d14;
        --bg-panel: #0f141f;
        --bg-pane: #090d14;
        --bg-status: #0e131f;
        --border-color: #283244;

        --text-main: #d9e2f2;
        --text-header: #ffffff;
        --text-sub: #8da2bf;
        --text-status: #74d59b;
        --text-status-err: #ff8c8c;

        --theme-selector-bg: #161b26;
        --theme-selector-text: #8da2bf;

        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body.light-theme {
        --bg-main: #f3f4f6;
        --bg-header: #ffffff;
        --bg-panel: #f9fafb;
        --bg-pane: #ffffff;
        --bg-status: #f3f4f6;
        --border-color: #e5e7eb;

        --text-main: #1f2937;
        --text-header: #111827;
        --text-sub: #4b5563;
        --text-status: #059669;
        --text-status-err: #dc2626;

        --theme-selector-bg: #ffffff;
        --theme-selector-text: #4b5563;

        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg-main);
        color: var(--text-main);
        overflow: hidden;
        transition:
          background 0.15s,
          color 0.15s;
      }
      header {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border-color);
        background: var(--bg-header);
        height: 60px;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-header);
        letter-spacing: -0.02em;
        transition: color 0.15s;
      }
      header span {
        color: var(--text-sub);
        font-size: 12px;
        transition: color 0.15s;
      }
      button {
        margin-left: auto;
        border: 0;
        border-radius: 6px;
        padding: 8px 16px;
        background: #ff7a45;
        color: #17120f;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #ff9c6e;
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: calc(100vh - 60px);
      }
      section {
        min-width: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      section + section {
        border-left: 1px solid var(--border-color);
        transition: border-color 0.15s;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-color);
        background: var(--bg-panel);
        height: 40px;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      label {
        color: var(--text-sub);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
        transition: color 0.15s;
      }
      .editor-pane {
        flex: 1;
        overflow: hidden;
        position: relative;
        background: var(--bg-pane);
        transition: background 0.15s;
      }
      .cm-editor {
        height: 100%;
        font-size: 13px;
      }
      #theme-selector,
      #example-selector {
        background: var(--theme-selector-bg);
        color: var(--theme-selector-text);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 11px;
        outline: none;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
      }
      #theme-selector:hover,
      #example-selector:hover {
        border-color: var(--text-sub);
        color: var(--text-header);
      }
      #status {
        padding: 12px 16px;
        min-height: 50px;
        max-height: 150px;
        border-top: 1px solid var(--border-color);
        color: var(--text-status);
        font-size: 12px;
        white-space: pre-wrap;
        overflow-y: auto;
        background: var(--bg-status);
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }
      #status.error {
        color: var(--text-status-err);
      }
      @media (max-width: 800px) {
        main {
          grid-template-columns: 1fr;
          height: calc(100vh - 60px);
        }
        section + section {
          border-left: 0;
          border-top: 1px solid var(--border-color);
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Rustify Playground</h1>
      <span>Strict TypeScript → readable Rust</span>
      <button id="compile">Compile</button>
    </header>
    <main>
      <section>
        <div class="panel-header">
          <label>Rustify TypeScript</label>

          <div style="display: flex; gap: 8px">
            <select id="example-selector">
              <option value="hello">1. Hello World (Básico)</option>
              <option value="globals">2. Constantes Globales</option>
              <option value="control_flow">3. Flujo de Control</option>
              <option value="arrays">4. Operaciones con Arrays</option>
              <option value="strings">5. Operaciones con Strings</option>
              <option value="enums_options">6. Enums y Opciones</option>
              <option value="async_promesas">
                7. Asincronismo y Promesas (Complejo)
              </option>
            </select>

            <select id="theme-selector">
              <option value="onedark">One Dark</option>
              <option value="light">Tema Claro</option>
            </select>
          </div>
        </div>

        <div id="source-container" class="editor-pane"></div>
        <div id="status">Loading example…</div>
      </section>
      <section>
        <div class="panel-header">
          <label>Generated Rust</label>
        </div>
        <div id="output-container" class="editor-pane"></div>
      </section>
    </main>

    <script type="module">
      import {
        EditorState,
        Compartment,
      } from "https://esm.sh/@codemirror/state";
      import {
        EditorView,
        keymap,
        lineNumbers,
        highlightActiveLineGutter,
      } from "https://esm.sh/@codemirror/view";
      import {
        defaultKeymap,
        history,
        historyKeymap,
      } from "https://esm.sh/@codemirror/commands";
      import { javascript } from "https://esm.sh/@codemirror/lang-javascript";
      import { rust } from "https://esm.sh/@codemirror/lang-rust";
      import { oneDark } from "https://esm.sh/@codemirror/theme-one-dark";
      import { xcodeLight } from "https://esm.sh/@uiw/codemirror-theme-xcode";
      import {
        autocompletion,
        completionKeymap,
      } from "https://esm.sh/@codemirror/autocomplete";
      import { bracketMatching } from "https://esm.sh/@codemirror/language";

      const themeCompartment = new Compartment();
      const status = document.querySelector("#status");
      let timer;

      // Configuración base de CodeMirror para Rustify
      const baseTheme = EditorView.theme({
        "&": { height: "100%" },
        ".cm-scroller": { overflow: "auto" },
        ".cm-gutters": { border: "none" },
      });

      // Inicializar editor izquierdo (TypeScript)
      const leftState = EditorState.create({
        doc: "",
        extensions: [
          lineNumbers(),
          highlightActiveLineGutter(),
          history(),
          bracketMatching(),
          javascript({ typescript: true }),
          themeCompartment.of(oneDark),
          baseTheme,
          autocompletion(),
          keymap.of([...defaultKeymap, ...historyKeymap, ...completionKeymap]),
          EditorView.updateListener.of((update) => {
            if (update.docChanged) {
              clearTimeout(timer);
              timer = setTimeout(compile, 250);
            }
          }),
        ],
      });

      const leftEditor = new EditorView({
        state: leftState,
        parent: document.querySelector("#source-container"),
      });

      // Inicializar editor derecho (Rust - Lectura únicamente)
      const rightState = EditorState.create({
        doc: "",
        extensions: [
          lineNumbers(),
          highlightActiveLineGutter(),
          bracketMatching(),
          rust(),
          themeCompartment.of(oneDark),
          baseTheme,
          EditorState.readOnly.of(true),
          EditorView.editable.of(false),
        ],
      });

      const rightEditor = new EditorView({
        state: rightState,
        parent: document.querySelector("#output-container"),
      });

      // Compilación automática llamando a la API local de Rustify
      async function compile() {
        status.textContent = "Compiling…";
        status.className = "";

        const sourceCode = leftEditor.state.doc.toString();

        try {
          const response = await fetch("/api/compile", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ source: sourceCode }),
          });
          const result = await response.json();

          // Actualizar editor de Rust derecho
          rightEditor.dispatch({
            changes: {
              from: 0,
              to: rightEditor.state.doc.length,
              insert: result.rust ?? "",
            },
          });

          if (result.valid) {
            status.textContent = "Native Rustify compilation passed.";
          } else {
            status.className = "error";
            status.textContent = result.diagnostics
              .map(
                (item) =>
                  `[${item.code}] ${item.message}${item.hint ? `\nHint: ${item.hint}` : ""}`,
              )
              .join("\n\n");
          }
        } catch (err) {
          status.className = "error";
          status.textContent = "Error de red o compilación: " + err.message;
        }
      }

      // Ejemplos predefinidos
      const EXAMPLES = {
        hello: `type User = {
  name: string
  active: boolean
}

function greet(user: User): string {
  return \`Hello \${user.name}\`
}

function buildUser(): User {
  return { name: "Ada", active: true }
}`,
        globals: `export const appName = "RustifyGlobalDemo";
export const timeoutMs = 5000;
export const maxConnections = 20;

function getConfigDescription(): string {
  return \`App: \${appName}, Timeout: \${timeoutMs}ms, Max: \${maxConnections}\`;
}`,
        control_flow: `function sum(values: number[]): number {
  let total: number = 0;

  for (const value of values) {
    if (value === 0) { continue; }

    total = total + value;

    if (total > 100) { break; }
  }

  return total;
}

function describeNumber(value: number): string {
  if (value > 0) {
    return "positive";
  } else if (value < 0) {
    return "negative";
  } else {
    return "zero";
  }
}`,
        arrays: `function manageList(values: string[], target: string): string[] {
  let result: string[] = values;
  result.push(target);
  const last = result.pop();

  return result;
}

function atIndex(values: number[], index: number): number | null {
  return values[index];
}

function getArrayLength(items: string[]): number {
  return items.length;
}`,
        strings: `function contains(values: string[], target: string): boolean {
  return values.includes(target);
}

function matches(value: string, target: string): boolean {
  return value.includes(target) && value.startsWith(target) || value.endsWith(target);
}

function normalize(value: string): string {
  return value.trim().toLowerCase();
}

function joined(values: string[], separator: string): string {
  return values.join(separator);
}`,
        enums_options: `enum Status {
  Active,
  Inactive
}

function currentStatus(): Status {
  return Status.Active;
}

function maybeValue(enabled: boolean): string | null {
  if (enabled) { return "yes"; }
  return null;
}

function checkOption(value: string | null): boolean {
  return value.isSome();
}`,
        async_promesas: `async function loadMessage(): Promise<string> {
  return "ready";
}

async function relayMessage(): Promise<string> {
  return await loadMessage();
}

async function pause(ms: number): Promise<void> {
  await Rustify.sleep(ms);
}`,
      };

      // Selector de Ejemplos
      const exampleSelector = document.querySelector("#example-selector");
      exampleSelector.addEventListener("change", (e) => {
        const key = e.target.value;

        if (EXAMPLES[key]) {
          leftEditor.dispatch({
            changes: {
              from: 0,
              to: leftEditor.state.doc.length,
              insert: EXAMPLES[key],
            },
          });
          compile();
        }
      });

      // Selector de Temas Dinámico
      const themeSelector = document.querySelector("#theme-selector");
      themeSelector.addEventListener("change", (e) => {
        const selected = e.target.value;
        const themeExtension = selected === "onedark" ? oneDark : xcodeLight;

        // Cambiar la clase del layout completo
        if (selected === "light") {
          document.body.classList.add("light-theme");
        } else {
          document.body.classList.remove("light-theme");
        }

        // Aplicar el cambio a ambos editores
        leftEditor.dispatch({
          effects: themeCompartment.reconfigure(themeExtension),
        });
        rightEditor.dispatch({
          effects: themeCompartment.reconfigure(themeExtension),
        });
      });

      // Cargar ejemplo inicial
      fetch("/api/example")
        .then((response) => response.text())
        .then((example) => {
          leftEditor.dispatch({
            changes: {
              from: 0,
              to: leftEditor.state.doc.length,
              insert: example,
            },
          });

          return compile();
        })
        .catch((error) => {
          status.className = "error";
          status.textContent = "Error cargando el ejemplo: " + error;
        });

      document.querySelector("#compile").addEventListener("click", compile);
    </script>
  </body>
</html>
